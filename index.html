<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Social</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #534AB7;
      --accent-light: #EEEDFE;
      --accent-dark: #3C3489;
      --accent-rgb: 83,74,183;
      --radius-card: 20px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #F4F5F9; }

    /* ── Cards ── */
    .card {
      background: #fff;
      border: 1px solid rgba(0,0,0,.06);
      border-radius: var(--radius-card);
      box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.03);
      transition: box-shadow .2s, transform .2s;
    }
    .card:hover { box-shadow: 0 4px 24px rgba(0,0,0,.08); }

    /* ── Nav ── */
    .nav-btn {
      position: relative; white-space: nowrap; font-size: .8125rem;
      font-weight: 500; padding: .5rem .875rem; border-radius: 10px;
      color: #6B7280; transition: color .15s, background .15s;
    }
    .nav-btn:hover { background: #F3F4F6; color: #111827; }
    .nav-btn.active { background: var(--accent); color: #fff; }

    /* ── Inputs ── */
    input, select, textarea {
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), .12);
    }

    /* ── Scrollbar ── */
    .scrollbar-thin::-webkit-scrollbar { height: 5px; width: 5px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 10px; }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes slideRight {
      from { transform: scaleX(0); } to { transform: scaleX(1); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; } 50% { opacity: .4; }
    }
    @keyframes countUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }

    .anim-fade-up  { animation: fadeUp .35s cubic-bezier(.22,1,.36,1) both; }
    .anim-fade-in  { animation: fadeIn .25s ease both; }
    .anim-d1 { animation-delay: .05s; }
    .anim-d2 { animation-delay: .10s; }
    .anim-d3 { animation-delay: .15s; }
    .anim-d4 { animation-delay: .20s; }
    .anim-d5 { animation-delay: .25s; }

    /* ── Progress bar animated ── */
    .prog-bar { transform-origin: left; animation: slideRight .7s cubic-bezier(.22,1,.36,1) both; }

    /* ── KPI number ── */
    .kpi-num { animation: countUp .4s cubic-bezier(.22,1,.36,1) both; }

    /* ── Dot status ── */
    .dot-live { animation: pulse-dot 1.5s ease infinite; }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }

    /* ── Selector overlay ── */
    #selector-bg {
      background: radial-gradient(ellipse at 30% 60%, #1a1744 0%, #0d0d1a 100%);
    }
    .selector-card {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      transition: background .2s, transform .2s, border-color .2s, box-shadow .2s;
      cursor: pointer;
    }
    .selector-card:hover {
      background: rgba(255,255,255,.12);
      border-color: rgba(255,255,255,.25);
      transform: translateY(-4px);
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }

    /* ── Accent button ── */
    .btn-accent {
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      padding: .5rem 1rem;
      font-size: .8125rem;
      font-weight: 600;
      transition: filter .15s, transform .1s;
    }
    .btn-accent:hover { filter: brightness(1.08); }
    .btn-accent:active { transform: scale(.97); }

    /* ── Tag badge ── */
    .tag { font-size: .6875rem; font-weight: 600; padding: .2rem .55rem; border-radius: 6px; }

    /* ── Metric tooltip ── */
    .tip-wrap { position: relative; display: inline-flex; align-items: center; }
    .tip-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 14px; height: 14px; border-radius: 50%;
      background: #E5E7EB; color: #9CA3AF; font-size: 9px; font-weight: 700;
      cursor: default; margin-left: 4px; font-style: normal; line-height: 1;
      transition: background .15s; flex-shrink: 0; border: none; padding: 0;
    }
    .tip-icon:hover, .tip-icon:focus { background: var(--accent-light); color: var(--accent); outline: none; }
    .tip-pop {
      position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
      background: #111827; color: #f9fafb; font-size: 11px; line-height: 1.6;
      padding: 10px 13px; border-radius: 13px; width: 220px; z-index: 200;
      pointer-events: none; opacity: 0; transition: opacity .15s .05s;
      white-space: normal; text-align: left; font-weight: 400;
      box-shadow: 0 8px 32px rgba(0,0,0,.35);
    }
    .tip-pop::after {
      content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      border: 5px solid transparent; border-top-color: #111827;
    }
    .tip-wrap:hover .tip-pop, .tip-icon:focus + .tip-pop { opacity: 1; }

    /* ── Modal ── */
    #modal-root .modal-sheet {
      animation: fadeUp .25s cubic-bezier(.22,1,.36,1) both;
    }
    #modal-root .modal-backdrop {
      animation: fadeIn .2s ease both;
    }

    /* ── Toast ── */
    .toast-item {
      animation: fadeUp .3s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── Table row ── */
    tbody tr { transition: background .1s; }

    /* ── Gradient text ── */
    .text-gradient {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Chart tooltip custom ── */
    .chartjs-tooltip {
      background: #1a1a2e !important;
      border-radius: 10px !important;
    }
  </style>
</head>
<body class="antialiased min-h-screen">
  <div id="app" class="min-h-screen flex flex-col"></div>
  <div id="modal-root"></div>
  <div id="toast-root" class="fixed bottom-5 right-5 z-[60] flex flex-col gap-2 pointer-events-none"></div>

  <script src="storage.js"></script>
  <script src="insights.js"></script>
  <script src="app.js"></script>
</body>
</html>
